<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1411" />
<title>Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0f1411; }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #e8e3d5;
    min-height: 100vh;
    min-height: 100dvh;
  }
  button { font-family: inherit; }

  .response h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c9a961;
    margin: 24px 0 12px 0;
    font-weight: 500;
  }
  .response h2:first-child { margin-top: 0; }
  .response ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .response li {
    font-size: 17px;
    line-height: 1.5;
    padding: 6px 0 6px 18px;
    position: relative;
  }
  .response li:before {
    content: "•";
    position: absolute;
    left: 0;
    color: #c9a961;
  }
  .response p { font-size: 17px; line-height: 1.5; margin: 8px 0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(15, 20, 17, 0.3);
    border-top-color: #0f1411;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

// ==== CONFIG: paste your n8n production webhook URL below ====
const WEBHOOK_URL = "https://although-mount-hello-limousines.trycloudflare.com/webhook/scorecard";
// =============================================================

const FIELDS = [
  { label: "Sleep", key: "sleep" },
  { label: "Physical health", key: "physical_health" },
  { label: "Physical energy", key: "physical_energy" },
  { label: "Cognitive ease", key: "cognitive_ease" },
  { label: "Focus", key: "focus" },
  { label: "Strategic clarity", key: "strategic_clarity" },
  { label: "Emotional stability", key: "emotional_stability" },
];

function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split("\n");
  const blocks = [];
  let currentList = null;
  const flushList = () => {
    if (currentList) {
      blocks.push({ type: "ul", items: currentList });
      currentList = null;
    }
  };
  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) { flushList(); return; }
    if (trimmed.startsWith("## ")) {
      flushList();
      blocks.push({ type: "h2", text: trimmed.slice(3) });
    } else if (trimmed.startsWith("•") || trimmed.startsWith("- ") || trimmed.startsWith("* ")) {
      const item = trimmed.replace(/^[•\-*]\s*/, "");
      if (!currentList) currentList = [];
      currentList.push(item);
    } else {
      flushList();
      blocks.push({ type: "p", text: trimmed });
    }
  });
  flushList();
  return blocks.map((b, i) => {
    if (b.type === "h2") return <h2 key={i}>{b.text}</h2>;
    if (b.type === "ul") return <ul key={i}>{b.items.map((it, j) => <li key={j}>{it}</li>)}</ul>;
    return <p key={i}>{b.text}</p>;
  });
}

function Scorecard() {
  const [ratings, setRatings] = useState(
    Object.fromEntries(FIELDS.map((f) => [f.key, 0]))
  );
  const [loading, setLoading] = useState(false);
  const [response, setResponse] = useState("");
  const [error, setError] = useState("");

  const setRating = (key, value) => {
    setRatings((prev) => ({
      ...prev,
      [key]: prev[key] === value ? 0 : value,
    }));
  };

  const allRated = FIELDS.every((f) => ratings[f.key] > 0);

  const handleSubmit = async () => {
    setLoading(true);
    setError("");
    setResponse("");
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(ratings),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const text = data.analysis || data.text || data.response || data.output || JSON.stringify(data);
      setResponse(text);
    } catch (err) {
      setError(err.message || "Request failed");
    } finally {
      setLoading(false);
    }
  };

  const handleReset = () => {
    setRatings(Object.fromEntries(FIELDS.map((f) => [f.key, 0])));
    setResponse("");
    setError("");
  };

  return (
    <div style={{
      minHeight: "100vh",
      padding: "32px 20px",
      display: "flex",
      justifyContent: "center",
    }}>
      <div style={{ width: "100%", maxWidth: 520 }}>
        <header style={{ marginBottom: 36 }}>
          <div style={{
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11,
            letterSpacing: "0.25em",
            color: "#c9a961",
            textTransform: "uppercase",
            marginBottom: 8,
          }}>
            Daily Check-in
          </div>
          <h1 style={{
            fontSize: 38,
            fontWeight: 500,
            letterSpacing: "-0.02em",
            margin: 0,
            lineHeight: 1.1,
          }}>
            Scorecard
          </h1>
        </header>

        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {FIELDS.map((field, i) => (
            <div key={field.key} style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              padding: "18px 0",
              borderBottom: i === FIELDS.length - 1 ? "none" : "1px solid rgba(232, 227, 213, 0.08)",
            }}>
              <span style={{ fontSize: 19, fontWeight: 400 }}>{field.label}</span>
              <div style={{ display: "flex", gap: 6 }}>
                {[1, 2, 3].map((star) => {
                  const active = ratings[field.key] >= star;
                  return (
                    <button
                      key={star}
                      onClick={() => setRating(field.key, star)}
                      aria-label={`${field.label} ${star} star${star > 1 ? "s" : ""}`}
                      style={{
                        background: "transparent",
                        border: "none",
                        padding: 4,
                        cursor: "pointer",
                        fontSize: 26,
                        lineHeight: 1,
                        color: active ? "#c9a961" : "rgba(232, 227, 213, 0.2)",
                        transition: "color 150ms ease",
                      }}
                    >★</button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", gap: 12, marginTop: 28 }}>
          <button
            onClick={handleSubmit}
            disabled={!allRated || loading}
            style={{
              flex: 1,
              padding: "14px 20px",
              background: (allRated && !loading) ? "#c9a961" : "rgba(201, 169, 97, 0.2)",
              color: (allRated && !loading) ? "#0f1411" : "rgba(232, 227, 213, 0.4)",
              border: "none",
              borderRadius: 4,
              fontSize: 13,
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: "0.15em",
              textTransform: "uppercase",
              cursor: (allRated && !loading) ? "pointer" : "not-allowed",
              transition: "background 150ms ease",
            }}
          >
            {loading ? <><span className="spinner"></span>Analysing</> : "Submit"}
          </button>
          <button
            onClick={handleReset}
            disabled={loading}
            style={{
              padding: "14px 20px",
              background: "transparent",
              color: "#e8e3d5",
              border: "1px solid rgba(232, 227, 213, 0.2)",
              borderRadius: 4,
              fontSize: 13,
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: "0.15em",
              textTransform: "uppercase",
              cursor: loading ? "not-allowed" : "pointer",
              opacity: loading ? 0.5 : 1,
            }}
          >
            Reset
          </button>
        </div>

        {error && (
          <div style={{
            marginTop: 24,
            padding: 16,
            background: "rgba(180, 60, 60, 0.1)",
            border: "1px solid rgba(180, 60, 60, 0.3)",
            borderRadius: 4,
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 12,
            color: "#d88080",
          }}>
            Error: {error}
          </div>
        )}

        {response && (
          <div className="response" style={{
            marginTop: 32,
            padding: 24,
            background: "rgba(232, 227, 213, 0.04)",
            border: "1px solid rgba(232, 227, 213, 0.08)",
            borderRadius: 4,
          }}>
            {renderMarkdown(response)}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Scorecard />);
</script>
</body>
</html>
